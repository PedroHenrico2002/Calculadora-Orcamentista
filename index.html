<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Orçamentista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Calculadora Orçamentista</h1>
            <p>Cadastre produtos e visualize custos, margens e precificação automaticamente.</p>
        </header>

        <section class="form-section">
            <h2>Novo Produto</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="nome">Nome do Produto:</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="custoDireto">Custo Direto (R$):</label>
                        <input type="number" id="custoDireto" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="outrosCustos">Outros Custos (R$):</label>
                        <input type="number" id="outrosCustos" step="0.01" min="0" value="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="margemDesejada">Margem Desejada (%):</label>
                    <input type="number" id="margemDesejada" step="0.01" min="0" max="100" required>
                </div>
                <button type="submit">Adicionar Produto</button>
                <button type="button" id="limparBtn">Limpar Todos</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Lista de Produtos</h2>
            <div class="search-section">
                <label for="searchInput">🔍 Buscar por nome:</label>
                <input type="text" id="searchInput" placeholder="Digite o nome do produto...">
            </div>
            <div id="summary" class="summary"></div>
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Custo Direto</th>
                        <th>Outros Custos</th>
                        <th>Custo Total</th>
                        <th>Margem (%)</th>
                        <th>Preço Venda</th>
                        <th>Lucro</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
